<!-- NAVIGATION -->
<app-navbar></app-navbar>

<!-- CONTENU -->
<div class="container content-page">
    <div class="row pt-5 mt-5">

        <!-- FORMULAIRE -->
        <div class="col-12 col-md-5 mb-4">
            <form class="form p-4 mt-3">

                <h3 class="text-light text-center mb-3">
                    Client
                </h3>

                <div class="form-floating mb-2">
                    <input type="text" class="form-control form-control-sm"
                        placeholder="Nom"
                        [(ngModel)]="nom"
                        [ngModelOptions]="{ standalone: true }"
                        (keyup)="regexNom(nom); lenNom(nom); isComplete()" />
                    <label class="text-dark">Nom</label>
                </div>

                <div class="form-floating mb-2">
                    <input type="text" class="form-control form-control-sm"
                        placeholder="Prénoms"
                        [(ngModel)]="prenom"
                        [ngModelOptions]="{ standalone: true }"
                        (keyup)="regexPrenom(prenom); lenPrenom(prenom); isComplete()" />
                    <label class="text-dark">Prénoms</label>
                </div>

                <div class="form-floating mb-2">
                    <input type="text" class="form-control form-control-sm"
                        placeholder="Adresse"
                        [(ngModel)]="adresse"
                        [ngModelOptions]="{ standalone: true }"
                        (keyup)="lenAdresse(adresse); isComplete()" />
                    <label class="text-dark">Adresse</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="text" class="form-control form-control-sm"
                        placeholder="Téléphone"
                        [(ngModel)]="tel"
                        [ngModelOptions]="{ standalone: true }"
                        (keyup)="regxTel(tel); lenTel(tel); isComplete()" />
                    <label class="text-dark">Téléphone</label>
                </div>

                <!-- BOUTONS -->
                <div class="d-flex flex-wrap justify-content-center gap-2">
                    <button class="btn btn-success btn-sm"
                        [disabled]="!isCompleted"
                        (click)="createClient()">
                        AJOUTER
                    </button>

                    <button class="btn btn-warning btn-sm"
                        [disabled]="!isCompleted"
                        (click)="updateClient()">
                        MODIFIER
                    </button>

                    <button class="btn btn-danger btn-sm"
                        [disabled]="!isCompleted"
                        (click)="deleteClient()">
                        SUPPRIMER
                    </button>

                    <button class="btn btn-dark btn-sm"
                        (click)="clearChamps()">
                        ANNULER
                    </button>
                </div>

            </form>
        </div>

        <!-- TABLE -->
        <div class="col-12 col-md-7">

            <h2 class="text-light text-center mb-3">
                Liste des clients
            </h2>

            <div class="table-responsive table-container">
                <table class="table table-striped table-bordered text-center">

                    <thead>
                        <tr>
                            <th>N° Client</th>
                            <th>Nom et Prénoms</th>
                            <th>Adresse</th>
                            <th>Téléphone</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let client of tableClient | filterClient : searchText">
                            <td class="fw-bold">{{ client.numCli }}</td>
                            <td>{{ client.nom + ' ' + client.prenom }}</td>
                            <td>{{ client.adresse }}</td>
                            <td>{{ client.tel }}</td>
                            <td>
                                <button class="btn btn-sm btn-dark"
                                    (click)="prepareACTION(client)">
                                    <i class="fa fa-pencil-square-o"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>

        </div>

    </div>
</div>
