<!-- CONTENUE -->
<div class="container content-page">

    <div class="row g-4" style="padding-top: 120px;">

        <!-- FORMULAIRE -->
        <div class="col-12 col-md-5">

            <form class="form p-4">

                <h3 class="text-center text-light mb-3">CLIENT</h3>

                <div class="form-floating mb-2">
                    <input type="text"
                           class="form-control"
                           placeholder="Nom"
                           [(ngModel)]="nom"
                           [ngModelOptions]="{ standalone: true }"
                           (keyup)="regexNom(nom); lenNom(nom); isComplete()">
                    <label>Nom</label>
                </div>

                <div class="form-floating mb-2">
                    <input type="text"
                           class="form-control"
                           placeholder="Prénoms"
                           [(ngModel)]="prenom"
                           [ngModelOptions]="{ standalone: true }"
                           (keyup)="regexPrenom(prenom); lenPrenom(prenom); isComplete()">
                    <label>Prénoms</label>
                </div>

                <div class="form-floating mb-2">
                    <input type="text"
                           class="form-control"
                           placeholder="Adresse"
                           [(ngModel)]="adresse"
                           [ngModelOptions]="{ standalone: true }"
                           (keyup)="lenAdresse(adresse); isComplete()">
                    <label>Adresse</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="text"
                           class="form-control"
                           placeholder="Téléphone"
                           [(ngModel)]="tel"
                           [ngModelOptions]="{ standalone: true }"
                           (keyup)="regxTel(tel); lenTel(tel); isComplete()">
                    <label>Téléphone</label>
                </div>

                <div class="d-flex flex-wrap gap-2">

                    <button class="btn btn-success btn-sm"
                            [disabled]="!isCompleted"
                            (click)="createClient()">
                        AJOUTER
                    </button>

                    <button class="btn btn-warning btn-sm"
                            [disabled]="!isCompleted"
                            (click)="updateClient()">
                        MODIFIER
                    </button>

                    <button class="btn btn-danger btn-sm"
                            [disabled]="!isCompleted"
                            (click)="deleteClient()">
                        SUPPRIMER
                    </button>

                    <button class="btn btn-dark btn-sm"
                            (click)="clearChamps()">
                        ANNULER
                    </button>

                </div>

            </form>
        </div>

        <!-- TABLE -->
        <div class="col-12 col-md-7">

            <h2 class="text-center text-light mb-3">
                Liste des clients
            </h2>

            <div class="table-responsive table-container">

                <table class="table table-striped table-bordered text-center">

                    <thead>
                        <tr>
                            <th>Client</th>
                            <th>Nom & Prénoms</th>
                            <th>Adresse</th>
                            <th>Téléphone</th>
                            <th class="col-action">ACTION</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let client of tableClient | filterClient: searchText">

                            <td>{{ client.numCli }}</td>
                            <td>{{ client.nom }} {{ client.prenom }}</td>
                            <td>{{ client.adresse }}</td>
                            <td>{{ client.tel }}</td>

                            <td class="col-action">
                                <button class="btn btn-dark btn-sm"
                                        (click)="prepareACTION(client)">
                                    <i class="fa fa-edit"></i>
                                </button>
                            </td>

                        </tr>
                    </tbody>

                </table>

            </div>
        </div>

    </div>
</div>
