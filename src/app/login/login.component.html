<div class="container-login">
  <form
    autocomplete="off"
    class="form-login shadow-lg"
  >
    <h1 class="h3 mb-4 fw-bold text-center text-light">
      LOGIN
    </h1>

    <input
      type="text"
      class="form-control mb-3"
      id="userName"
      placeholder="Nom d'utilisateur"
      [(ngModel)]="userName"
      [ngModelOptions]="{ standalone: true }"
    />

    <input
      type="password"
      class="form-control mb-3"
      id="password"
      placeholder="Mot de passe"
      [(ngModel)]="password"
      [ngModelOptions]="{ standalone: true }"
    />

    <p class="text-danger small">
      {{ erroText }}
    </p>

    <button
      class="btn btn-connexion w-100 py-2 text-white"
      type="button"
      (click)="onSignIn()"
    >
      Se connecter
    </button>
  </form>
</div>
