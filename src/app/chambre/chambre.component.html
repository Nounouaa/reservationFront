<!-- NAVIGATION -->
<app-navbar></app-navbar>
<div class="container content-page">

    <!-- FORM CHAMBRE -->
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            <form class="form bg-light p-4 mb-4">

                <div class="form-group mb-3">
                    <label>Type</label>
                    <select class="form-select"
    name="typeC"
    [(ngModel)]="typeC">
                        <option value="Simple">Simple</option>
                        <option value="Double">Double</option>
                    </select>
                </div>

                <div class="form-group mb-3">
                    <label>Nombre de lit(s)</label>
                    <input type="text" class="form-control"
                        [(ngModel)]="nbreLit"
                        (keyup)="lenNbLit(nbreLit); regxNbLit(nbreLit); isComplete()"
                        [ngModelOptions]="{ standalone: true }" />
                </div>

                <div class="form-group mb-3">
                    <label>Prix</label>
                    <input type="text" class="form-control"
                        [(ngModel)]="prix"
                        (keyup)="lenNbPrix(prix); regxPrix(prix); isComplete()"
                        [ngModelOptions]="{ standalone: true }" />
                </div>

                <button class="btn btn-primary w-100 mt-3"
                    (click)="create()"
                    [disabled]="!isCompleted">
                    Créer
                </button>

            </form>
        </div>
    </div>

    <!-- CARTES -->
    <div class="row">
        <div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4"
            *ngFor="let chambre of arrayChambre | filterPersonnel : searchText">

            <div class="card h-100 shadow-lg">

                <div class="card-body text-center">
                    <h5>Chambre n° {{ chambre.numChambre }}</h5>
                    <p>{{ chambre.nbreLit }} lit(s)</p>
                    <p>{{ chambre.prix }} Ar</p>

                    <p>
                        Status :
                        <span [ngClass]="{
                            'text-success': chambre.statusC === 'disponible',
                            'text-danger': chambre.statusC === 'occupée'
                        }">
                            {{ chambre.statusC }}
                        </span>
                    </p>
                </div>

                <div class="p-2 d-flex flex-column gap-2">
                    <button *ngIf="chambre.statusC === 'disponible'"
                        class="btn btn-success btn-sm"
                        (click)="reserver(chambre.numChambre)">
                        Réserver
                    </button>

                    <button *ngIf="chambre.statusC === 'occupée'"
                        class="btn btn-danger btn-sm" disabled>
                        Occupée
                    </button>

                    <button class="btn btn-dark btn-sm"
                        (click)="liberer(chambre.numChambre)">
                        Libérer
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- FORM RESERVATION -->
    <!-- FORM RESERVATION -->
<div class="row justify-content-center mt-4" id="reservationForm">
        <div class="col-12 col-md-6 col-lg-5">
            <form class="form bg-light p-4">

                <h4 class="text-center mb-3">Réservation</h4>

                <div class="mb-3">
                    <label>N° Client</label>
                   <input class="form-control"
    name="numCli"
    [(ngModel)]="numCli"
    (keyup)="verifyIm()">
                </div>

                <p class="text-danger" *ngIf="isInscrit === false">Introuvable</p>
                <p class="text-success" *ngIf="isInscrit === true">Vérifié</p>

                <div class="mb-3">
                    <label>Numéro Chambre</label>
                    <input class="form-control"
    name="numChambre"
    [(ngModel)]="numChambre"
    disabled>
                </div>

                <div class="mb-3">
                    <label>Date début</label>
                    <input type="date"
    name="dateDeb"
    [(ngModel)]="dateDeb">
                </div>

                <div class="mb-3">
                    <label>Date fin</label>
                    <input type="date"
    name="dateFin"
    [(ngModel)]="dateFin">
                </div>

                <button class="btn btn-primary w-100"
                    (click)="valider()">
                    Valider
                </button>

            </form>
        </div>
    </div>

</div>
