<!-- NAVIGATION -->
<nav
    class="navbar navbar-expand-sm navbar-dark fixed-top shadow-lg border-1 border-bottom mb-5"
    style="background-color: #9d0bff"
>
    <div class="container-fluid">
        <a class="navbar-brand"
            ><i class="fa fa-home"></i> R E S E R V A T I O N - C H A M B R E
        </a>

        <ul class="navbar-nav m-auto">
            <li class="nav-item">
                <a
                    class="nav-link"
                    routerLink="/client"
                    routerLinkActive="active"
                    ><i class="fa fa-user"></i> CLIENT</a
                >
            </li>
            <li class="nav-item">
                <a
                    class="nav-link"
                    routerLink="/reservation"
                    routerLinkActive="active"
                    ><i class="fa fa-pencil"></i> RESERVATION</a
                >
            </li>
            <li class="nav-item">
                <a
                    class="nav-link"
                    routerLink="/chambre"
                    routerLinkActive="active"
                    ><i class="fa fa-home"></i> CHAMBRE</a
                >
            </li>
        </ul>
        <form class="d-flex">
            <input
                role="search"
                class="form-control me-2"
                type="text"
                [(ngModel)]="searchText"
                [ngModelOptions]="{ standalone: true }"
                placeholder="Recherche"
            />
            <button class="btn btn-dark" type="button">
                <i class="fa fa-search"></i>
            </button>
        </form>
        <button
            class="btn btn-outline-dark btn-lg text-light ms-4"
            (click)="confirm_deconnect()"
        >
            Se deconnecter
        </button>
    </div>
</nav>

<div class="container" style="margin-top: 5%">
    <div class="row">
        <div class="col">
            <h2 class="text-light text-center">
                Liste des toutes les réservations de chambres
            </h2>

            <div class="table table-responsive" style="height: 300px">
                <table class="table table-striped table-bordered text-center">
                    <thead>
                        <tr>
                            <th scope="col">N ° C l i e n t</th>
                            <th scope="col">N ° Chambre</th>
                            <th scope="col">Date de début</th>
                            <th scope="col">Date de fin</th>
                            <th scope="col">A C T I O N</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr
                            *ngFor="
                                let res of tableReservation
                                    | filterClient : searchText
                            "
                        >
                            <td class="fw-bold">{{ res.numCli }}</td>
                            <td>{{ res.numChambre }}</td>
                            <td>{{ res.dateDeb }}</td>
                            <td>{{ res.dateFin }}</td>
                            <td>
                                <button
                                    class="btn btn-sm btn-success mx-2"
                                    (click)="getPdf(res.numCli)"
                                >
                                    <i class="fa fa-file-pdf-o">
                                        <span class="mx-2">Imprimer</span></i
                                    >
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
